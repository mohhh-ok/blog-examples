# Cloud Build for lightweight SDXL image (no weight bake, for RunPod Network Volume).
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=docker/sdxl/Dockerfile.light
      - --tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/sdxl:light
      - .
images:
  - ${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/sdxl:light
options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 30
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _AR_HOST: us-central1-docker.pkg.dev
  _AR_REPO: cold-start-bench
timeout: 1200s
